<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Мысли</title>
  
  <!-- Telegram & Supabase SDKs -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-app: #0d0d0f;
      --bg-card: #18181c;
      --bg-card-hover: #222228;
      --bg-input: #121215;
      --text-main: #ededed;
      --text-muted: #8e8e93;
      --accent: #2c2c30;
      --accent-active: #3a3a40;
      --danger: #ff453a;
      --radius-card: 24px;
      --radius-pill: 9999px;
      --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.45);
      --border-subtle: 1px solid rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 24px) 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .badge-guest {
      background: #2a2010;
      color: #ffb340;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255, 179, 64, 0.2);
    }

    /* Search Bar */
    .search-box {
      background: var(--bg-card);
      border: var(--border-subtle);
      border-radius: var(--radius-pill);
      padding: 12px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-float);
    }

    .search-box svg {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 15px;
      width: 100%;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    /* Notes List */
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .note-card {
      background: var(--bg-card);
      border: var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 18px 20px;
      box-shadow: var(--shadow-float);
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .note-card:active {
      transform: scale(0.98);
      background: var(--bg-card-hover);
    }

    .note-card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-card-preview {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .note-card-date {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* Floating Action Button */
    .btn-float {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      right: 20px;
      background: var(--text-main);
      color: var(--bg-app);
      border: none;
      border-radius: var(--radius-pill);
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s ease;
      z-index: 50;
    }

    .btn-float:active {
      transform: scale(0.94);
    }

    /* Editor Screen Overlay */
    .editor-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-app);
      z-index: 100;
      padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 20px) 16px;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .editor-screen.active {
      transform: translateY(0);
    }

    .editor-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .btn-pill {
      background: var(--bg-card);
      border: var(--border-subtle);
      color: var(--text-main);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-danger {
      color: var(--danger);
    }

    .save-status {
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-title {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      width: 100%;
    }

    .editor-title::placeholder {
      color: var(--text-muted);
    }

    .editor-body {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      width: 100%;
      flex: 1;
      font-family: inherit;
    }

    .editor-body::placeholder {
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      margin-top: 80px;
      font-size: 15px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Main Screen -->
  <div class="header">
    <div class="app-title">Мысли</div>
    <div id="userBadge" class="badge-guest" style="display:none;">Гостевой режим</div>
  </div>

  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="Поиск по трекам и текстам..." oninput="renderNotes()">
  </div>

  <div id="notesList" class="notes-list"></div>

  <button class="btn-float" onclick="openEditor()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    <span>Новый трек</span>
  </button>

  <!-- Editor Screen Overlay -->
  <div id="editorScreen" class="editor-screen">
    <div class="editor-topbar">
      <button class="btn-pill" onclick="closeEditor()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Назад
      </button>
      <span id="saveStatus" class="save-status">Сохранено</span>
      <button class="btn-pill btn-danger" onclick="deleteCurrentNote()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      </button>
    </div>
    <input type="text" id="noteTitle" class="editor-title" placeholder="Название трека" oninput="handleAutoSave()">
    <textarea id="noteContent" class="editor-body" placeholder="Пиши текст трека..." oninput="handleAutoSave()"></textarea>
  </div>

  <script>
    let supabase = null;
    let currentUser = null;
    let notes = [];
    let currentNoteId = null;
    let autoSaveTimer = null;

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function triggerHaptic(type = 'impact', style = 'light') {
      if (tg?.HapticFeedback) {
        if (type === 'impact') tg.HapticFeedback.impactOccurred(style);
        if (type === 'notification') tg.HapticFeedback.notificationOccurred(style);
      }
    }

    async function initApp() {
      try {
        const configRes = await fetch('/api/config');
        const config = await configRes.json();
        supabase = supabaseClient.createClient(config.supabaseUrl, config.supabaseAnonKey);
      } catch (e) {
        console.error("Ошибка загрузки конфигурации", e);
        return;
      }

      const initData = tg?.initData;
      if (initData) {
        try {
          const res = await fetch('/api/telegram-auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData })
          });
          const data = await res.json();
          if (data.user) currentUser = data.user;
        } catch (e) {
          console.error("Ошибка авторизации TG, переход в гостевой режим", e);
        }
      }

      if (!currentUser) {
        document.getElementById('userBadge').style.display = 'block';
        let localGuestId = sessionStorage.getItem('guest_id');
        if (!localGuestId) {
          localGuestId = 'guest_' + Math.random().toString(36).substr(2, 9);
          sessionStorage.setItem('guest_id', localGuestId);
        }
        currentUser = { id: localGuestId, is_guest: true };
      }

      await loadNotes();
    }

    async function loadNotes() {
      if (currentUser.is_guest) {
        const raw = sessionStorage.getItem('guest_notes');
        notes = raw ? JSON.parse(raw) : [];
      } else {
        const { data, error } = await supabase
          .from('notes')
          .select('*')
          .eq('user_id', currentUser.id)
          .order('updated_at', { ascending: false });
        if (!error) notes = data || [];
      }
      renderNotes();
    }

    function renderNotes() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('notesList');
      container.innerHTML = '';

      const filtered = notes.filter(n => 
        (n.title && n.title.toLowerCase().includes(query)) || 
        (n.content && n.content.toLowerCase().includes(query))
      );

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">Заметок пока нет.<br>Нажми «Новый трек», чтобы записать текст.</div>`;
        return;
      }

      filtered.forEach(note => {
        const dateStr = new Date(note.updated_at || note.created_at).toLocaleDateString('ru-RU', {
          day: 'numeric', month: 'short'
        });

        const card = document.createElement('div');
        card.className = 'note-card';
        card.onclick = () => openEditor(note.id);
        card.innerHTML = `
          <div class="note-card-title">${note.title || 'Без названия'}</div>
          <div class="note-card-preview">${note.content || 'Пустой текст...'}</div>
          <div class="note-card-date">${dateStr}</div>
        `;
        container.appendChild(card);
      });
    }

    function openEditor(noteId = null) {
      triggerHaptic('impact', 'medium');
      currentNoteId = noteId;
      const editor = document.getElementById('editorScreen');
      const titleInput = document.getElementById('noteTitle');
      const contentInput = document.getElementById('noteContent');

      if (noteId) {
        const note = notes.find(n => n.id === noteId);
        titleInput.value = note.title || '';
        contentInput.value = note.content || '';
      } else {
        titleInput.value = '';
        contentInput.value = '';
      }

      document.getElementById('saveStatus').innerText = 'Сохранено';
      editor.classList.add('active');
    }

    function closeEditor() {
      triggerHaptic('impact', 'light');
      document.getElementById('editorScreen').classList.remove('active');
      renderNotes();
    }

    function handleAutoSave() {
      document.getElementById('saveStatus').innerText = 'Сохранение...';
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(async () => {
        await saveCurrentNote();
        document.getElementById('saveStatus').innerText = 'Сохранено';
      }, 600);
    }

    async function saveCurrentNote() {
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();

      if (!title && !content) return;

      const now = new Date().toISOString();

      if (currentUser.is_guest) {
        if (!currentNoteId) {
          currentNoteId = 'local_' + Date.now();
          notes.unshift({ id: currentNoteId, user_id: currentUser.id, title, content, updated_at: now });
        } else {
          const idx = notes.findIndex(n => n.id === currentNoteId);
          if (idx !== -1) {
            notes[idx] = { ...notes[idx], title, content, updated_at: now };
          }
        }
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        if (!currentNoteId) {
          const { data } = await supabase
            .from('notes')
            .insert({ user_id: currentUser.id, title, content })
            .select()
            .single();
          if (data) currentNoteId = data.id;
        } else {
          await supabase
            .from('notes')
            .update({ title, content, updated_at: now })
            .eq('id', currentNoteId);
        }
        await loadNotes();
      }
    }

    async function deleteCurrentNote() {
      if (!currentNoteId) return closeEditor();
      
      triggerHaptic('notification', 'warning');
      
      if (currentUser.is_guest) {
        notes = notes.filter(n => n.id !== currentNoteId);
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        await supabase.from('notes').delete().eq('id', currentNoteId);
        await loadNotes();
      }
      closeEditor();
    }

    initApp();
  </script>
</body>
</html>
