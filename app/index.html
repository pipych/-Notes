<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Мысли</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-app: #0d0d0f;
      --bg-card: #18181c;
      --bg-card-hover: #222228;
      --text-main: #ededed;
      --text-muted: #8e8e93;
      --danger: #ff453a;
      --radius-card: 24px;
      --radius-pill: 9999px;
      --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.45);
      --border-subtle: 1px solid rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 24px) 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .status-bar {
      font-size: 11px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: var(--bg-card);
      border: var(--border-subtle);
      color: var(--text-muted);
      margin-bottom: 16px;
      word-break: break-all;
    }

    .search-box {
      background: var(--bg-card);
      border: var(--border-subtle);
      border-radius: var(--radius-pill);
      padding: 12px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-float);
    }

    .search-box svg {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 15px;
      width: 100%;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .note-card {
      background: var(--bg-card);
      border: var(--border-subtle);
      border-radius: var(--radius-card);
      padding: 18px 20px;
      box-shadow: var(--shadow-float);
      cursor: pointer;
    }

    .note-card:active {
      background: var(--bg-card-hover);
    }

    .note-card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .note-card-preview {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .note-card-date {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .btn-float {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      right: 20px;
      background: var(--text-main);
      color: var(--bg-app);
      border: none;
      border-radius: var(--radius-pill);
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 50;
    }

    .editor-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-app);
      z-index: 9999;
      padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 20px) 16px;
      display: none;
      flex-direction: column;
    }

    .editor-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .btn-pill {
      background: var(--bg-card);
      border: var(--border-subtle);
      color: var(--text-main);
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-danger {
      color: var(--danger);
    }

    .save-status {
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-title {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      width: 100%;
    }

    .editor-body {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      width: 100%;
      flex: 1;
      font-family: inherit;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      margin-top: 80px;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="app-title">Мысли</div>
  </div>

  <div id="statusBar" class="status-bar">Запуск...</div>

  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="Поиск по трекам..." oninput="renderNotes()">
  </div>

  <div id="notesList" class="notes-list"></div>

  <button class="btn-float" onclick="openEditor()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    <span>Новый трек</span>
  </button>

  <div id="editorScreen" class="editor-screen">
    <div class="editor-topbar">
      <button class="btn-pill" onclick="closeEditor()">Назад</button>
      <span id="saveStatus" class="save-status">Сохранено</span>
      <button class="btn-pill btn-danger" onclick="deleteCurrentNote()">Удалить</button>
    </div>
    <input type="text" id="noteTitle" class="editor-title" placeholder="Название трека" oninput="handleAutoSave()">
    <textarea id="noteContent" class="editor-body" placeholder="Пиши текст трека..." oninput="handleAutoSave()"></textarea>
  </div>

  <script>
    const SUPABASE_URL = "https://sxdswgoqgvkmddknqzir.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_7_PN5q0F5n9wdnnSm4xiLQ_vHEftQL9";

    let supabase = null;
    let currentUser = null;
    let notes = [];
    let currentNoteId = null;
    let autoSaveTimer = null;

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function setStatus(text) {
      const el = document.getElementById('statusBar');
      if (el) el.innerText = text;
    }

    async function initApp() {
      // Инициализация клиентом Supabase
      try {
        const supabaseLib = window.supabase || window.supabaseClient;
        if (supabaseLib) {
          supabase = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
          setStatus("Ошибка: Supabase SDK не подгрузился");
        }
      } catch (e) {
        setStatus("Ошибка инициализации Supabase: " + e.message);
      }

      // Подключение пользователя Telegram
      const tgUser = tg?.initDataUnsafe?.user;

      if (tgUser && supabase) {
        try {
          let { data: profile, error: selectErr } = await supabase
            .from('profiles')
            .select('*')
            .eq('telegram_id', tgUser.id)
            .maybeSingle();

          if (selectErr) {
            setStatus("Ошибка выбора профиля: " + selectErr.message);
          }

          if (!profile) {
            const { data: newProfile, error: insErr } = await supabase
              .from('profiles')
              .insert({
                telegram_id: tgUser.id,
                first_name: tgUser.first_name || '',
                username: tgUser.username || '',
                is_guest: false
              })
              .select()
              .single();
            
            if (insErr) {
              setStatus("Ошибка создания профиля: " + insErr.message);
            } else {
              profile = newProfile;
            }
          }

          if (profile) {
            currentUser = profile;
            setStatus("Авторизован: " + (profile.first_name || profile.telegram_id));
          }
        } catch (err) {
          setStatus("Исключение БД: " + err.message);
        }
      }

      // Гостевой режим
      if (!currentUser) {
        let localGuestId = sessionStorage.getItem('guest_id');
        if (!localGuestId) {
          localGuestId = 'guest_' + Math.random().toString(36).substr(2, 9);
          sessionStorage.setItem('guest_id', localGuestId);
        }
        currentUser = { id: localGuestId, is_guest: true };
        setStatus("Гостевой режим");
      }

      await loadNotes();
    }

    async function loadNotes() {
      if (currentUser.is_guest || !supabase) {
        const raw = sessionStorage.getItem('guest_notes');
        notes = raw ? JSON.parse(raw) : [];
      } else {
        const { data, error } = await supabase
          .from('notes')
          .select('*')
          .eq('user_id', currentUser.id)
          .order('updated_at', { ascending: false });
        if (!error) notes = data || [];
      }
      renderNotes();
    }

    function renderNotes() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('notesList');
      container.innerHTML = '';

      const filtered = notes.filter(n => 
        (n.title && n.title.toLowerCase().includes(query)) || 
        (n.content && n.content.toLowerCase().includes(query))
      );

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">Заметок пока нет.<br>Нажми «Новый трек», чтобы записать текст.</div>`;
        return;
      }

      filtered.forEach(note => {
        const dateStr = new Date(note.updated_at || note.created_at).toLocaleDateString('ru-RU', {
          day: 'numeric', month: 'short'
        });

        const card = document.createElement('div');
        card.className = 'note-card';
        card.onclick = () => openEditor(note.id);
        card.innerHTML = `
          <div class="note-card-title">${note.title || 'Без названия'}</div>
          <div class="note-card-preview">${note.content || 'Пустой текст...'}</div>
          <div class="note-card-date">${dateStr}</div>
        `;
        container.appendChild(card);
      });
    }

    function openEditor(noteId = null) {
      currentNoteId = noteId;
      const editor = document.getElementById('editorScreen');
      const titleInput = document.getElementById('noteTitle');
      const contentInput = document.getElementById('noteContent');

      if (noteId && notes) {
        const note = notes.find(n => n.id === noteId);
        titleInput.value = note ? (note.title || '') : '';
        contentInput.value = note ? (note.content || '') : '';
      } else {
        titleInput.value = '';
        contentInput.value = '';
      }

      document.getElementById('saveStatus').innerText = 'Сохранено';
      editor.style.display = 'flex';
    }

    function closeEditor() {
      document.getElementById('editorScreen').style.display = 'none';
      renderNotes();
    }

    function handleAutoSave() {
      document.getElementById('saveStatus').innerText = 'Сохранение...';
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(async () => {
        await saveCurrentNote();
        document.getElementById('saveStatus').innerText = 'Сохранено';
      }, 600);
    }

    async function saveCurrentNote() {
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();

      if (!title && !content) return;

      const now = new Date().toISOString();

      if (currentUser.is_guest || !supabase) {
        if (!currentNoteId) {
          currentNoteId = 'local_' + Date.now();
          notes.unshift({ id: currentNoteId, user_id: currentUser.id, title, content, updated_at: now });
        } else {
          const idx = notes.findIndex(n => n.id === currentNoteId);
          if (idx !== -1) {
            notes[idx] = { ...notes[idx], title, content, updated_at: now };
          }
        }
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        if (!currentNoteId) {
          const { data } = await supabase
            .from('notes')
            .insert({ user_id: currentUser.id, title, content })
            .select()
            .single();
          if (data) currentNoteId = data.id;
        } else {
          await supabase
            .from('notes')
            .update({ title, content, updated_at: now })
            .eq('id', currentNoteId);
        }
        await loadNotes();
      }
    }

    async function deleteCurrentNote() {
      if (!currentNoteId) return closeEditor();

      if (currentUser.is_guest || !supabase) {
        notes = notes.filter(n => n.id !== currentNoteId);
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        await supabase.from('notes').delete().eq('id', currentNoteId);
        await loadNotes();
      }
      closeEditor();
    }

    initApp();
  </script>
</body>
</html>
