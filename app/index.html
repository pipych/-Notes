<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Мысли</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg-app: #08080a;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-bg-hover: rgba(255, 255, 255, 0.09);
      --glass-blur: blur(20px) saturate(180%);
      --glass-border: 1px solid rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --glass-highlight: inset 0 1px 1px 0 rgba(255, 255, 255, 0.2);
      
      --text-main: #ededed;
      --text-muted: #8e8e93;
      --danger: #ff453a;
      --radius-card: 22px;
      --radius-pill: 9999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      padding: 16px 16px calc(env(safe-area-inset-bottom) + 24px) 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.in-tg {
      padding-top: calc(env(safe-area-inset-top) + 110px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .status-bar {
      font-size: 11px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      box-shadow: var(--glass-highlight);
      color: var(--text-muted);
      margin-bottom: 16px;
      word-break: break-all;
    }

    .search-box {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      box-shadow: var(--glass-shadow), var(--glass-highlight);
      border-radius: var(--radius-pill);
      padding: 12px 18px;
      margin-bottom: 20px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 15px;
      width: 100%;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .note-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      box-shadow: var(--glass-shadow), var(--glass-highlight);
      border-radius: var(--radius-card);
      padding: 18px 20px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .note-card:active {
      background: var(--glass-bg-hover);
      transform: scale(0.98);
    }

    .note-card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .note-card-preview {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .note-card-date {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .btn-float {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      right: 20px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: #000;
      border: var(--glass-border);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), var(--glass-highlight);
      border-radius: var(--radius-pill);
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      z-index: 50;
      transition: transform 0.15s ease;
    }

    .btn-float:active {
      transform: scale(0.95);
    }

    .editor-screen {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 10, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      z-index: 9999;
      padding: 16px 16px calc(env(safe-area-inset-bottom) + 20px) 16px;
      display: none;
      flex-direction: column;
    }

    body.in-tg .editor-screen {
      padding-top: calc(env(safe-area-inset-top) + 110px);
    }

    .editor-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      box-shadow: var(--glass-highlight);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn-icon:active {
      background: var(--glass-bg-hover);
      transform: scale(0.92);
    }

    .btn-icon.btn-danger {
      color: var(--danger);
    }

    .editor-title {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      width: 100%;
    }

    .editor-body {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      width: 100%;
      flex: 1;
      font-family: inherit;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      margin-top: 80px;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="app-title">Мысли</div>
  </div>

  <div id="statusBar" class="status-bar">Запуск...</div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Поиск по трекам..." oninput="renderNotes()">
  </div>

  <div id="notesList" class="notes-list"></div>

  <button id="btnNewTrack" class="btn-float">＋ Новый трек</button>

  <div id="editorScreen" class="editor-screen">
    <div class="editor-topbar">
      <button class="btn-icon" id="btnBack">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span id="saveStatus" style="font-size:12px; color:var(--text-muted);">Сохранено</span>
      <button class="btn-icon btn-danger" id="btnDelete">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
    <input type="text" id="noteTitle" class="editor-title" placeholder="Название трека" oninput="handleAutoSave()">
    <textarea id="noteContent" class="editor-body" placeholder="Пиши текст трека..." oninput="handleAutoSave()"></textarea>
  </div>

  <script>
    const SUPABASE_URL = "https://bnregnrapuvjtwufvmzn.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucmVnbnJhcHV2anR3dWZ2bXpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MTMxOTUsImV4cCI6MjEwMDM4OTE5NX0.CmZ0pDWnLIKYpWpfwq9ZX1Ybk6LwC3__qvGz5SQwzcw";

    let currentUser = null;
    let notes = [];
    let currentNoteId = null;
    let autoSaveTimer = null;

    function setStatus(txt) {
      document.getElementById('statusBar').innerText = txt;
    }

    async function supabaseFetch(path, options = {}) {
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        ...(options.headers || {})
      };
      const response = await fetch(SUPABASE_URL + '/rest/v1' + path, { ...options, headers });
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`[${response.status}] ${errText}`);
      }
      if (response.status === 204) return null;
      return await response.json();
    }

    document.getElementById('btnNewTrack').onclick = () => openEditor();
    document.getElementById('btnBack').onclick = () => closeEditor();
    document.getElementById('btnDelete').onclick = () => deleteCurrentNote();

    async function init() {
      try {
        const tg = window.Telegram?.WebApp;
        if (tg) {
          tg.ready();
          tg.expand();
          if (tg.initData || (tg.platform && tg.platform !== 'unknown')) {
            document.body.classList.add('in-tg');
          }
        }

        const tgUser = tg?.initDataUnsafe?.user;

        if (tgUser) {
          setStatus("Подключение к Supabase...");
          
          let profiles = await supabaseFetch(`/profiles?telegram_id=eq.${tgUser.id}&select=*`);
          let profile = profiles && profiles.length > 0 ? profiles[0] : null;

          if (!profile) {
            setStatus("Создание профиля...");
            let created = await supabaseFetch('/profiles', {
              method: 'POST',
              headers: { 'Prefer': 'return=representation' },
              body: JSON.stringify({
                telegram_id: tgUser.id,
                first_name: tgUser.first_name || '',
                username: tgUser.username || '',
                is_guest: false
              })
            });
            profile = created ? created[0] : null;
          }

          if (profile) {
            currentUser = profile;
            setStatus("Профиль создан/активен: " + (profile.first_name || profile.telegram_id));
          }
        }

        if (!currentUser) {
          let localGuestId = sessionStorage.getItem('guest_id');
          if (!localGuestId) {
            localGuestId = 'guest_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('guest_id', localGuestId);
          }
          currentUser = { id: localGuestId, is_guest: true };
          setStatus("Гостевой режим");
        }

        await loadNotes();

      } catch (err) {
        setStatus("Ошибка: " + err.message);
      }
    }

    async function loadNotes() {
      if (currentUser.is_guest) {
        const raw = sessionStorage.getItem('guest_notes');
        notes = raw ? JSON.parse(raw) : [];
      } else {
        try {
          notes = await supabaseFetch(`/notes?user_id=eq.${currentUser.id}&order=updated_at.desc&select=*`) || [];
        } catch (e) {
          setStatus("Ошибка загрузки заметок: " + e.message);
        }
      }
      renderNotes();
    }

    function renderNotes() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('notesList');
      container.innerHTML = '';

      const filtered = notes.filter(n => 
        (n.title && n.title.toLowerCase().includes(query)) || 
        (n.content && n.content.toLowerCase().includes(query))
      );

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">Заметок нет.<br>Нажми «Новый трек», чтобы написать.</div>`;
        return;
      }

      filtered.forEach(note => {
        const dateStr = new Date(note.updated_at || note.created_at || Date.now()).toLocaleDateString('ru-RU', {
          day: 'numeric', month: 'short'
        });

        const card = document.createElement('div');
        card.className = 'note-card';
        card.onclick = () => openEditor(note.id);
        card.innerHTML = `
          <div class="note-card-title">${note.title || 'Без названия'}</div>
          <div class="note-card-preview">${note.content || 'Пустой текст...'}</div>
          <div class="note-card-date">${dateStr}</div>
        `;
        container.appendChild(card);
      });
    }

    function openEditor(noteId = null) {
      currentNoteId = noteId;
      const editor = document.getElementById('editorScreen');
      const titleInput = document.getElementById('noteTitle');
      const contentInput = document.getElementById('noteContent');

      if (noteId && notes) {
        const note = notes.find(n => n.id === noteId);
        titleInput.value = note ? (note.title || '') : '';
        contentInput.value = note ? (note.content || '') : '';
      } else {
        titleInput.value = '';
        contentInput.value = '';
      }

      document.getElementById('saveStatus').innerText = 'Сохранено';
      editor.style.display = 'flex';
    }

    function closeEditor() {
      document.getElementById('editorScreen').style.display = 'none';
      renderNotes();
    }

    function handleAutoSave() {
      document.getElementById('saveStatus').innerText = 'Сохранение...';
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(async () => {
        await saveCurrentNote();
        document.getElementById('saveStatus').innerText = 'Сохранено';
      }, 600);
    }

    async function saveCurrentNote() {
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();

      if (!title && !content) return;

      const now = new Date().toISOString();

      if (currentUser.is_guest) {
        if (!currentNoteId) {
          currentNoteId = 'local_' + Date.now();
          notes.unshift({ id: currentNoteId, user_id: currentUser.id, title, content, updated_at: now });
        } else {
          const idx = notes.findIndex(n => n.id === currentNoteId);
          if (idx !== -1) {
            notes[idx] = { ...notes[idx], title, content, updated_at: now };
          }
        }
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        if (!currentNoteId) {
          const res = await supabaseFetch('/notes', {
            method: 'POST',
            headers: { 'Prefer': 'return=representation' },
            body: JSON.stringify({ user_id: currentUser.id, title, content })
          });
          if (res && res[0]) currentNoteId = res[0].id;
        } else {
          await supabaseFetch(`/notes?id=eq.${currentNoteId}`, {
            method: 'PATCH',
            body: JSON.stringify({ title, content, updated_at: now })
          });
        }
        await loadNotes();
      }
    }

    async function deleteCurrentNote() {
      if (!currentNoteId) return closeEditor();

      if (currentUser.is_guest) {
        notes = notes.filter(n => n.id !== currentNoteId);
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        await supabaseFetch(`/notes?id=eq.${currentNoteId}`, { method: 'DELETE' });
        await loadNotes();
      }
      closeEditor();
    }

    init();
  </script>
</body>
</html>
