<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bars</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg-app: #08080a;
      --card-bg: #16161c;
      --card-bg-active: #22222a;
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      
      --text-main: #ededed;
      --text-muted: #8e8e93;
      --danger: #ff453a;
      --success: #34c759;
      --radius-card: 20px;
      --radius-pill: 9999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulseBtn {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5);
      }
      70% {
        transform: scale(1.08);
        box-shadow: 0 0 0 16px rgba(255, 255, 255, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.3); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .dots-bounce {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 2px;
    }

    .dots-bounce span {
      width: 7px;
      height: 7px;
      background: var(--text-main);
      border-radius: 50%;
      animation: dotBounce 1.4s infinite ease-in-out both;
    }

    .dots-bounce span:nth-child(1) { animation-delay: -0.32s; }
    .dots-bounce span:nth-child(2) { animation-delay: -0.16s; }

    .animate-spin {
      animation: spin 0.8s linear infinite;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      padding: 16px 16px calc(env(safe-area-inset-bottom) + 115px) 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease-out;
    }

    body.in-tg {
      padding-top: calc(env(safe-area-inset-top) + 110px);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .app-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .search-box {
      background: rgba(255, 255, 255, 0.07);
      border: var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius-pill);
      padding: 12px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box svg {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 15px;
      width: 100%;
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
    }

    .note-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
      margin: 4px 0 8px 4px;
      letter-spacing: -0.4px;
    }

    .note-wrapper {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: transparent;
      animation: fadeIn 0.25s ease-out;
      max-height: 200px;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), margin 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
    }

    .note-group .note-wrapper:first-of-type {
      border-top-left-radius: var(--radius-card);
      border-top-right-radius: var(--radius-card);
    }

    .note-group .note-wrapper:last-of-type {
      border-bottom-left-radius: var(--radius-card);
      border-bottom-right-radius: var(--radius-card);
    }

    .note-group .note-wrapper:only-of-type {
      border-radius: var(--radius-card);
    }

    .note-delete-bg {
      position: absolute;
      inset: 0;
      background: var(--danger);
      border-radius: inherit;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 28px;
      color: #ffffff;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 1;
    }

    .note-card {
      position: relative;
      background: var(--card-bg);
      border: var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: inherit;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      touch-action: pan-y;
      transition: background 0.15s ease;
      will-change: transform;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 64px;
    }

    .note-card:active {
      background: var(--card-bg-active);
    }

    .note-card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
      padding-right: 60px;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-card-preview {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-card-date {
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .btn-float-icon {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 108px);
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #ffffff;
      color: #000000;
      border: var(--glass-border);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 50;
      transition: transform 0.15s ease, background 0.15s ease;
      will-change: transform;
    }

    .btn-float-icon.pulse {
      animation: pulseBtn 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }

    .btn-float-icon:active {
      transform: scale(0.92);
    }

    .bottom-nav-container {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 28px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(22, 22, 28, 0.88);
      border: var(--glass-border);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
      border-radius: var(--radius-pill);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 45;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 26px;
      border-radius: 22px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      user-select: none;
    }

    .nav-tab svg {
      width: 20px;
      height: 20px;
    }

    .nav-tab.active {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text-main);
    }

    .nav-tab:active {
      transform: scale(0.95);
    }

    .editor-screen, .profile-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-app);
      z-index: 9999;
      padding: 16px 16px calc(env(safe-area-inset-bottom) + 20px) 16px;
      display: none;
      flex-direction: column;
      animation: fadeIn 0.2s ease-out;
    }

    body.in-tg .editor-screen, body.in-tg .profile-screen {
      padding-top: calc(env(safe-area-inset-top) + 110px);
    }

    .editor-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .editor-topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-ai-rhyme {
      background: rgba(255, 255, 255, 0.08);
      border: var(--glass-border);
      color: #fff;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .btn-ai-rhyme:active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(0.95);
    }

    .btn-ai-rhyme.active {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .save-status-indicator {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.07);
      border: var(--glass-border);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.15s ease;
      will-change: transform;
    }

    .btn-icon:active {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(0.92);
    }

    .btn-icon.btn-danger {
      color: var(--danger);
    }

    .editor-main-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 12px;
      overflow: hidden;
    }

    .editor-text-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      transition: flex 0.3s ease;
      overflow: hidden;
    }

    .editor-title {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      width: 100%;
    }

    .editor-body {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      width: 100%;
      flex: 1;
      font-family: inherit;
    }

    .editor-ai-section {
      display: none;
      flex-direction: column;
      flex: 1;
      background: var(--card-bg);
      border: var(--glass-border);
      border-radius: var(--radius-card);
      overflow: hidden;
      animation: fadeIn 0.25s ease-out;
      box-shadow: var(--glass-shadow);
    }

    .editor-main-container.split-mode .editor-text-section {
      flex: 1;
    }

    .editor-main-container.split-mode .editor-ai-section {
      display: flex;
      flex: 1;
    }

    .ai-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ai-message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .ai-message.user {
      align-self: flex-end;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .ai-message.bot {
      align-self: flex-start;
      background: #22222a;
      border: var(--glass-border);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
    }

    .rhyme-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .rhyme-item:last-child {
      margin-bottom: 0;
    }

    .rhyme-spark-icon {
      color: rgba(255, 255, 255, 0.7);
      flex-shrink: 0;
    }

    .ai-chat-input-container {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.2);
      border-top: var(--glass-border);
      gap: 8px;
    }

    .ai-chat-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.07);
      border: var(--glass-border);
      border-radius: var(--radius-pill);
      padding: 8px 14px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .btn-ai-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fff;
      color: #000;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-ai-send:active {
      transform: scale(0.92);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 32px;
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }

    .empty-state-icon {
      color: var(--text-muted);
      opacity: 0.35;
      margin-bottom: 4px;
    }

    .empty-state-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .inline-plus-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      vertical-align: middle;
      margin: 0 3px;
      color: var(--text-main);
    }

    .profile-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 30px;
      flex: 1;
      gap: 16px;
    }

    .profile-avatar-large {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.07);
      border: var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .profile-name-text {
      font-size: 22px;
      font-weight: 700;
    }

    .profile-username-text {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: -10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="app-title">Bars</div>
    <button class="btn-icon" id="btnOpenProfile">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </div>

  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Поиск по трекам..." oninput="renderNotes()">
  </div>

  <div id="notesList" class="notes-list"></div>

  <div class="bottom-nav-container">
    <div class="nav-tab active" id="tabTracks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span>Треки</span>
    </div>
    <div class="nav-tab" id="tabDrafts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>Наброски</span>
    </div>
  </div>

  <button id="btnNewTrack" class="btn-float-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <div id="editorScreen" class="editor-screen">
    <div class="editor-topbar">
      <button class="btn-icon" id="btnBack">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>

      <div class="editor-topbar-actions">
        <button class="btn-ai-rhyme" id="btnToggleRhymes">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span>Рифмы AI</span>
        </button>
        <div id="saveStatus" class="save-status-indicator">
          <svg style="color: var(--success);" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="m9 15 2 2 4-4"/></svg>
        </div>
        <button class="btn-icon btn-danger" id="btnDelete">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>

    <div class="editor-main-container" id="editorContainer">
      <div class="editor-text-section">
        <input type="text" id="noteTitle" class="editor-title" placeholder="Название трека" oninput="handleAutoSave()">
        <textarea id="noteContent" class="editor-body" placeholder="Пиши текст трека..." oninput="handleAutoSave()"></textarea>
      </div>

      <div class="editor-ai-section">
        <div class="ai-chat-messages" id="aiChatMessages"></div>
        <div class="ai-chat-input-container">
          <input type="text" id="aiChatInput" class="ai-chat-input" placeholder="Напиши слово..." onkeypress="if(event.key==='Enter') sendAiRhymeQuery()">
          <button class="btn-ai-send" onclick="sendAiRhymeQuery()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="profileScreen" class="profile-screen">
    <div class="editor-topbar">
      <button class="btn-icon" id="btnProfileBack">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div style="font-weight: 600; font-size: 16px;">Профиль</div>
      <div style="width: 42px;"></div>
    </div>
    <div class="profile-container">
      <div class="profile-avatar-large">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div id="profileName" class="profile-name-text">Загрузка...</div>
      <div id="profileUsername" class="profile-username-text"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://bnregnrapuvjtwufvmzn.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucmVnbnJhcHV2anR3dWZ2bXpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MTMxOTUsImV4cCI6MjEwMDM4OTE5NX0.CmZ0pDWnLIKYpWpfwq9ZX1Ybk6LwC3__qvGz5SQwzcw";

    let currentUser = null;
    let notes = [];
    let currentNoteId = null;
    let autoSaveTimer = null;
    let activeTab = 'tracks';
    let currentChatHistory = [];

    const DEFAULT_WELCOME_MSG = "Привет! Напиши слово, и я подберу 10 лучших рифм для твоего трека. Если нужны рифмы, близкие по смыслу, просто уточни в запросе!";
    const SPARK_SVG = `<svg class="rhyme-spark-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3z"/></svg>`;

    function setSaveState(state) {
      const container = document.getElementById('saveStatus');
      if (state === 'saving') {
        container.innerHTML = `<svg class="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
      } else if (state === 'saved') {
        container.innerHTML = `<svg style="color: var(--success);" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="m9 15 2 2 4-4"/></svg>`;
      }
    }

    async function supabaseFetch(path, options = {}) {
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        ...(options.headers || {})
      };
      const response = await fetch(SUPABASE_URL + '/rest/v1' + path, { ...options, headers });
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`[${response.status}] ${errText}`);
      }
      if (response.status === 204) return null;
      return await response.json();
    }

    document.getElementById('btnNewTrack').onclick = () => openEditor();
    document.getElementById('btnBack').onclick = () => closeEditor();
    document.getElementById('btnDelete').onclick = () => deleteCurrentNote();
    document.getElementById('btnOpenProfile').onclick = () => openProfile();
    document.getElementById('btnProfileBack').onclick = () => closeProfile();

    document.getElementById('tabTracks').onclick = () => switchTab('tracks');
    document.getElementById('tabDrafts').onclick = () => switchTab('drafts');

    document.getElementById('btnToggleRhymes').onclick = toggleRhymesSplit;

    function toggleRhymesSplit() {
      const container = document.getElementById('editorContainer');
      const btn = document.getElementById('btnToggleRhymes');
      const isSplit = container.classList.toggle('split-mode');
      btn.classList.toggle('active', isSplit);
    }

    function switchTab(tab) {
      if (activeTab === tab) return;
      activeTab = tab;

      document.getElementById('tabTracks').classList.toggle('active', activeTab === 'tracks');
      document.getElementById('tabDrafts').classList.toggle('active', activeTab === 'drafts');

      const searchInput = document.getElementById('searchInput');
      if (activeTab === 'tracks') {
        searchInput.placeholder = 'Поиск по трекам...';
      } else {
        searchInput.placeholder = 'Поиск по наброскам...';
      }

      renderNotes();
    }

    async function init() {
      try {
        const tg = window.Telegram?.WebApp;
        if (tg) {
          tg.ready();
          tg.expand();
          if (typeof tg.requestFullscreen === 'function') {
            tg.requestFullscreen();
          }
          if (tg.initData || (tg.platform && tg.platform !== 'unknown')) {
            document.body.classList.add('in-tg');
          }
        }

        const tgUser = tg?.initDataUnsafe?.user;

        if (tgUser) {
          let profiles = await supabaseFetch(`/profiles?telegram_id=eq.${tgUser.id}&select=*`);
          let profile = profiles && profiles.length > 0 ? profiles[0] : null;

          if (!profile) {
            let created = await supabaseFetch('/profiles', {
              method: 'POST',
              headers: { 'Prefer': 'return=representation' },
              body: JSON.stringify({
                telegram_id: tgUser.id,
                first_name: tgUser.first_name || '',
                username: tgUser.username || '',
                is_guest: false
              })
            });
            profile = created ? created[0] : null;
          }

          if (profile) {
            currentUser = profile;
          }
        }

        if (!currentUser) {
          let localGuestId = sessionStorage.getItem('guest_id');
          if (!localGuestId) {
            localGuestId = 'guest_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('guest_id', localGuestId);
          }
          currentUser = { id: localGuestId, first_name: 'Гость', is_guest: true };
        }

        updateProfileUI();
        await loadNotes();

      } catch (err) {
        console.error(err);
      }
    }

    function updateProfileUI() {
      if (!currentUser) return;
      document.getElementById('profileName').innerText = currentUser.first_name || 'Пользователь';
      if (currentUser.username) {
        document.getElementById('profileUsername').innerText = '@' + currentUser.username;
      } else if (currentUser.is_guest) {
        document.getElementById('profileUsername').innerText = 'Гостевой режим';
      } else {
        document.getElementById('profileUsername').innerText = '';
      }
    }

    function openProfile() {
      document.getElementById('profileScreen').style.display = 'flex';
    }

    function closeProfile() {
      document.getElementById('profileScreen').style.display = 'none';
    }

    async function loadNotes() {
      if (currentUser.is_guest) {
        const raw = sessionStorage.getItem('guest_notes');
        notes = raw ? JSON.parse(raw) : [];
      } else {
        try {
          notes = await supabaseFetch(`/notes?user_id=eq.${currentUser.id}&order=updated_at.desc&select=*`) || [];
        } catch (e) {
          console.error(e);
        }
      }

      renderNotes();
    }

    function getDateCategory(dateString) {
      const now = new Date();
      const noteDate = new Date(dateString || Date.now());

      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startOfYesterday = new Date(startOfToday);
      startOfYesterday.setDate(startOfYesterday.getDate() - 1);
      
      const startOf7Days = new Date(startOfToday);
      startOf7Days.setDate(startOf7Days.getDate() - 7);

      const startOf30Days = new Date(startOfToday);
      startOf30Days.setDate(startOf30Days.getDate() - 30);

      if (noteDate >= startOfToday) return 'Сегодня';
      if (noteDate >= startOfYesterday) return 'Вчера';
      if (noteDate >= startOf7Days) return 'Предыдущие 7 дней';
      if (noteDate >= startOf30Days) return 'Предыдущие 30 дней';
      return 'Ранее';
    }

    function updatePulseState(currentCategoryEmpty) {
      const btn = document.getElementById('btnNewTrack');
      if (currentCategoryEmpty) {
        btn.classList.add('pulse');
      } else {
        btn.classList.remove('pulse');
      }
    }

    function renderNotes() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('notesList');
      container.innerHTML = '';

      const tabFiltered = notes.filter(n => {
        const hasTitle = n.title && n.title.trim() !== '';
        return activeTab === 'tracks' ? hasTitle : !hasTitle;
      });

      const filtered = tabFiltered.filter(n => 
        (n.title && n.title.toLowerCase().includes(query)) || 
        (n.content && n.content.toLowerCase().includes(query))
      );

      updatePulseState(tabFiltered.length === 0);

      if (filtered.length === 0) {
        const emptyText = activeTab === 'tracks' ? 'Треков пока нет' : 'Набросков пока нет';
        const emptySub = activeTab === 'tracks' ? 'написать трек' : 'создать набросок';

        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
              </svg>
            </div>
            <div class="empty-state-text">
              ${emptyText}<br>
              Нажми на <span class="inline-plus-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span> чтобы ${emptySub}
            </div>
          </div>
        `;
        return;
      }

      const groupsOrder = ['Сегодня', 'Вчера', 'Предыдущие 7 дней', 'Предыдущие 30 дней', 'Ранее'];
      const groupedNotes = {
        'Сегодня': [],
        'Вчера': [],
        'Предыдущие 7 дней': [],
        'Предыдущие 30 дней': [],
        'Ранее': []
      };

      filtered.forEach(note => {
        const cat = getDateCategory(note.updated_at || note.created_at);
        groupedNotes[cat].push(note);
      });

      groupsOrder.forEach(category => {
        const list = groupedNotes[category];
        if (list.length === 0) return;

        const groupEl = document.createElement('div');
        groupEl.className = 'note-group';

        const titleEl = document.createElement('h3');
        titleEl.className = 'section-title';
        titleEl.innerText = category;
        groupEl.appendChild(titleEl);

        list.forEach(note => {
          const dateStr = new Date(note.updated_at || note.created_at || Date.now()).toLocaleDateString('ru-RU', {
            day: 'numeric', month: 'short'
          });

          const hasExplicitTitle = note.title && note.title.trim() !== '';
          let titleText = '';
          let previewText = '';

          if (hasExplicitTitle) {
            titleText = note.title;
            if (note.content) {
              previewText = note.content.split(/\r?\n/)[0];
            }
          } else {
            const fullContent = note.content || 'Пустой текст...';
            titleText = fullContent.split(/\r?\n/)[0];
            previewText = '';
          }

          const wrapper = document.createElement('div');
          wrapper.className = 'note-wrapper';

          const deleteBg = document.createElement('div');
          deleteBg.className = 'note-delete-bg';
          deleteBg.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;

          const card = document.createElement('div');
          card.className = 'note-card';
          card.innerHTML = `
            <div class="note-card-date">${dateStr}</div>
            <div class="note-card-title">${titleText}</div>
            ${previewText ? `<div class="note-card-preview">${previewText}</div>` : ''}
          `;

          let startX = 0;
          let startY = 0;
          let currentTranslate = 0;
          let isTouchStarted = false;
          let isHorizontalSwipe = false;

          card.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isTouchStarted = true;
            isHorizontalSwipe = false;
            card.style.transition = 'none';
          }, { passive: true });

          card.addEventListener('touchmove', (e) => {
            if (!isTouchStarted) return;
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            const diffX = touchX - startX;
            const diffY = touchY - startY;

            if (!isHorizontalSwipe && Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 8) {
              isHorizontalSwipe = true;
            }

            if (isHorizontalSwipe) {
              if (diffX < 0) {
                const raw = Math.abs(diffX);
                const damped = raw > 70 ? 70 + (raw - 70) * 0.35 : raw;
                currentTranslate = -damped;
                deleteBg.style.opacity = Math.min(1, raw / 50);
                card.style.transform = `translateX(${currentTranslate}px)`;
              } else {
                currentTranslate = diffX * 0.15;
                card.style.transform = `translateX(${currentTranslate}px)`;
              }
            }
          }, { passive: true });

          card.addEventListener('touchend', () => {
            if (!isTouchStarted) return;
            isTouchStarted = false;

            if (currentTranslate < -75) {
              card.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 1, 1)';
              card.style.transform = 'translateX(-105%)';

              setTimeout(() => {
                wrapper.style.opacity = '0';
                wrapper.style.maxHeight = '0px';
                wrapper.style.marginBottom = '-2px';
              }, 120);

              setTimeout(async () => {
                const parentGroup = wrapper.closest('.note-group');
                wrapper.remove();
                if (parentGroup && !parentGroup.querySelector('.note-wrapper')) {
                  parentGroup.remove();
                }
                await hardDeleteNote(note.id);
              }, 420);
            } else {
              card.style.transition = 'transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.25)';
              card.style.transform = 'translateX(0px)';
              setTimeout(() => { deleteBg.style.opacity = '0'; }, 200);
            }
            currentTranslate = 0;
          });

          card.addEventListener('click', () => {
            if (!isHorizontalSwipe) {
              openEditor(note.id);
            }
          });

          wrapper.appendChild(deleteBg);
          wrapper.appendChild(card);
          groupEl.appendChild(wrapper);
        });

        container.appendChild(groupEl);
      });
    }

    async function hardDeleteNote(id) {
      notes = notes.filter(n => n.id !== id);

      if (currentUser.is_guest) {
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        try {
          await supabaseFetch(`/notes?id=eq.${id}`, { method: 'DELETE' });
        } catch (e) {
          console.error(e);
        }
      }
      renderNotes();
    }

    function openEditor(noteId = null) {
      currentNoteId = noteId;
      const editor = document.getElementById('editorScreen');
      const titleInput = document.getElementById('noteTitle');
      const contentInput = document.getElementById('noteContent');

      document.getElementById('editorContainer').classList.remove('split-mode');
      document.getElementById('btnToggleRhymes').classList.remove('active');

      if (noteId && notes) {
        const note = notes.find(n => n.id === noteId);
        titleInput.value = note ? (note.title || '') : '';
        contentInput.value = note ? (note.content || '') : '';
        currentChatHistory = (note && Array.isArray(note.chat_history)) ? [...note.chat_history] : [];
      } else {
        titleInput.value = '';
        contentInput.value = '';
        currentChatHistory = [];
      }

      renderChatUI();
      setSaveState('saved');
      editor.style.display = 'flex';
    }

    function closeEditor() {
      document.getElementById('editorScreen').style.display = 'none';
      renderNotes();
    }

    function handleAutoSave() {
      setSaveState('saving');
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(async () => {
        await saveCurrentNote();
        setSaveState('saved');
      }, 600);
    }

    async function saveCurrentNote() {
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();

      if (!title && !content && currentChatHistory.length === 0) return;

      const now = new Date().toISOString();

      if (currentUser.is_guest) {
        if (!currentNoteId) {
          currentNoteId = 'local_' + Date.now();
          notes.unshift({ id: currentNoteId, user_id: currentUser.id, title, content, chat_history: currentChatHistory, updated_at: now });
        } else {
          const idx = notes.findIndex(n => n.id === currentNoteId);
          if (idx !== -1) {
            notes[idx] = { ...notes[idx], title, content, chat_history: currentChatHistory, updated_at: now };
          }
        }
        sessionStorage.setItem('guest_notes', JSON.stringify(notes));
      } else {
        if (!currentNoteId) {
          const res = await supabaseFetch('/notes', {
            method: 'POST',
            headers: { 'Prefer': 'return=representation' },
            body: JSON.stringify({ user_id: currentUser.id, title, content, chat_history: currentChatHistory })
          });
          if (res && res[0]) currentNoteId = res[0].id;
        } else {
          await supabaseFetch(`/notes?id=eq.${currentNoteId}`, {
            method: 'PATCH',
            headers: { 'Prefer': 'return=representation' },
            body: JSON.stringify({ title, content, chat_history: currentChatHistory, updated_at: now })
          });
        }
        await loadNotes();
      }
    }

    async function deleteCurrentNote() {
      if (!currentNoteId) return closeEditor();
      await hardDeleteNote(currentNoteId);
      closeEditor();
    }

    /* AI Chat UI & Logic */
    function formatRhymesText(text) {
      if (!text) return '';
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
      
      if (lines.length <= 1 && !lines[0]?.match(/^\d+[\.\)]/)) {
        return text;
      }

      return lines.map(line => `<div class="rhyme-item">${SPARK_SVG}<span>${line}</span></div>`).join('');
    }

    function renderChatUI() {
      const chatContainer = document.getElementById('aiChatMessages');
      chatContainer.innerHTML = '';

      if (currentChatHistory.length === 0) {
        appendChatMessageUI('bot', DEFAULT_WELCOME_MSG);
      } else {
        currentChatHistory.forEach(msg => {
          const role = msg.role === 'user' ? 'user' : 'bot';
          const text = msg.parts?.[0]?.text || '';
          if (text) {
            const content = role === 'bot' ? formatRhymesText(text) : text;
            appendChatMessageUI(role, content);
          }
        });
      }
    }

    function appendChatMessageUI(role, contentHTML) {
      const chatContainer = document.getElementById('aiChatMessages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `ai-message ${role}`;
      msgDiv.innerHTML = contentHTML;
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msgDiv;
    }

    async function sendAiRhymeQuery() {
      const input = document.getElementById('aiChatInput');
      const query = input.value.trim();
      if (!query) return;

      input.value = '';
      appendChatMessageUI('user', query);

      currentChatHistory.push({ role: 'user', parts: [{ text: query }] });

      const loadingMsg = appendChatMessageUI('bot', `<div class="dots-bounce"><span></span><span></span><span></span></div>`);

      try {
        const systemInstruction = "Ты — гениальный поэт и рифмоплет. Твоя задача — подбирать сочные, идеальные и современные рифмы. КАТЕГОРИЧЕСКИ ЗАПРЕЩЕНО использовать форматирование Markdown (никакого жирного шрифта **, никаких звездочек, курсива, заголовков). Запрещено писать любые приветствия, комментарии, вводные или заключительные слова. Выдавай ИСКЛЮЧИТЕЛЬНО нумерованный чистый список рифм (или чистый список ответов по смыслу без разметки и без лишних слов). Каждый пункт списка пиши с новой строки.";

        const response = await fetch('/api/rhymes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: currentChatHistory,
            systemInstruction: systemInstruction
          })
        });

        if (!response.ok) {
          throw new Error('API Error');
        }

        const data = await response.json();
        let replyText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Не удалось подобрать рифмы, попробуй еще раз.";

        replyText = replyText.replace(/\*\*/g, '').replace(/\*/g, '');

        loadingMsg.innerHTML = formatRhymesText(replyText);
        currentChatHistory.push({ role: 'model', parts: [{ text: replyText }] });

        handleAutoSave();

      } catch (err) {
        console.error(err);
        loadingMsg.innerText = "Ошибка при запросе к AI. Проверь подключение или API ключ.";
      }
    }

    init();
  </script>
</body>
